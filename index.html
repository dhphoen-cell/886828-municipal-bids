    <style>
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            background-color: #030712;
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 100% 50%, rgba(220, 38, 38, 0.04) 0%, transparent 40%);
        }

        .editorial-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .editorial-card:hover {
            background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%);
            border-color: rgba(255,255,255,0.12);
            transform: translateY(-4px);
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.4),
                0 0 0 1px rgba(255,255,255,0.05);
        }

        .bid-title {
            position: relative;
        }

        .bid-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 3px;
            height: 0;
            background: linear-gradient(180deg, #3B82F6 0%, #1E3A5F 100%);
            transition: height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(-50%);
        }

        .editorial-card:hover .bid-title::before {
            height: 60%;
        }

        .modal-overlay {
            background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .tag {
            font-size: 0.6875rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
        }

        .scroll-indicator {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(8px); }
            60% { transform: translateY(4px); }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.03);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }

        .loading-line {
            position: relative;
            overflow: hidden;
        }

        .loading-line::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>

    <script>
        // Global data store
        let allBids = [];
        let filteredBids = [];
        let currentFilter = 'all';

        // Fetch and render bids on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadBids();
            setupFilterButtons();
            setupSearchInput();
        });

        // Fetch bids from JSON file
        async function loadBids() {
            try {
                const response = await fetch('bids.json');
                if (!response.ok) throw new Error('Failed to load bids.json');
                allBids = await response.json();
                filteredBids = [...allBids];
                renderBids(filteredBids);
            } catch (error) {
                console.error('Error loading bids:', error);
                document.getElementById('bidList').innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-ink-400">数据加载失败，请稍后重试</p>
                        <p class="text-ink-600 text-sm mt-2">${error.message}</p>
                    </div>
                `;
            }
        }

        // Render bid cards
        function renderBids(bids) {
            const bidList = document.getElementById('bidList');
            
            if (bids.length === 0) {
                bidList.innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-ink-400">暂无符合条件的招标信息</p>
                    </div>
                `;
                return;
            }

            bidList.innerHTML = bids.map((bid, index) => {
                const delay = 0.2 + (index * 0.1);
                const mainTag = bid.tags[0] || '市政';
                const otherTags = bid.tags.slice(1, 3);
                
                return `
                    <article class="editorial-card rounded-xl p-6 cursor-pointer animate-reveal" 
                             style="animation-delay: ${delay}s" 
                             data-bid='${JSON.stringify(bid)}'>
                        <div class="flex items-start justify-between gap-6">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-3">
                                    <span class="tag px-2 py-1 bg-slate-accent/20 text-slate-accent rounded border border-slate-accent/30">${mainTag}</span>
                                    ${otherTags.map(tag => `
                                        <span class="tag px-2 py-1 bg-ink-800 text-ink-400 rounded border border-ink-700">${tag}</span>
                                    `).join('')}
                                    <span class="tag px-2 py-1 bg-ink-800 text-ink-400 rounded border border-ink-700">${bid.location}</span>
                                </div>
                                <h3 class="bid-title text-xl font-serif text-white mb-3 pl-4 transition-all">
                                    ${bid.title}
                                </h3>
                                <p class="text-ink-500 text-sm line-clamp-2 pl-4">
                                    ${bid.source} · 发布日期：${bid.date}
                                </p>
                            </div>
                            <div class="text-right flex-shrink-0">
                                <p class="text-2xl font-serif text-crimson mb-1">${bid.budget}</p>
                                <p class="text-xs text-ink-500 font-mono mb-3">预算金额</p>
                                <div class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-ink-900 rounded-lg border border-ink-800">
                                    <svg class="w-3.5 h-3.5 text-ink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                                    </svg>
                                    <span class="text-xs text-ink-400 font-mono">查看原文</span>
                                </div>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');

            // Re-attach click listeners
            document.querySelectorAll('.editorial-card[data-bid]').forEach(card => {
                card.addEventListener('click', () => {
                    const data = JSON.parse(card.dataset.bid);
                    openModal(data);
                });
            });
        }

        // Setup filter buttons
        function setupFilterButtons() {
            const buttons = document.querySelectorAll('#filterButtons button');
            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    // Update active state
                    buttons.forEach(btn => {
                        btn.classList.remove('bg-slate-accent/20', 'text-slate-accent', 'border-slate-accent/30');
                        btn.classList.add('text-ink-400');
                    });
                    button.classList.remove('text-ink-400');
                    button.classList.add('bg-slate-accent/20', 'text-slate-accent', 'border-slate-accent/30');

                    // Filter bids
                    currentFilter = button.dataset.filter;
                    if (currentFilter === 'all') {
                        filteredBids = [...allBids];
                    } else {
                        filteredBids = allBids.filter(bid => 
                            bid.tags.some(tag => tag.includes(currentFilter))
                        );
                    }
                    renderBids(filteredBids);
                });
            });
        }

        // Setup search input
        function setupSearchInput() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                if (query === '') {
                    filteredBids = currentFilter === 'all' ? [...allBids] : allBids.filter(bid => 
                        bid.tags.some(tag => tag.includes(currentFilter))
                    );
                } else {
                    filteredBids = allBids.filter(bid => 
                        bid.title.toLowerCase().includes(query) ||
                        bid.location.toLowerCase().includes(query) ||
                        bid.tags.some(tag => tag.toLowerCase().includes(query))
                    );
                }
                renderBids(filteredBids);
            });
        }

        // Search function
        function searchBids() {
            const searchInput = document.getElementById('searchInput');
            const query = searchInput.value.toLowerCase().trim();
            if (query === '') {
                filteredBids = [...allBids];
            } else {
                filteredBids = allBids.filter(bid => 
                    bid.title.toLowerCase().includes(query) ||
                    bid.location.toLowerCase().includes(query) ||
                    bid.tags.some(tag => tag.toLowerCase().includes(query))
                );
            }
            renderBids(filteredBids);
        }

        // Modal functionality
        const modal = document.getElementById('bidModal');

        function openModal(data) {
            // Set tags
            const tagsContainer = document.getElementById('modalTags');
            tagsContainer.innerHTML = data.tags.map((tag, index) => {
                const bgColor = index === 0 ? 'bg-slate-accent/20 text-slate-accent border-slate-accent/30' : 'bg-ink-800 text-ink-400 border-ink-700';
                return `<span class="tag px-2 py-1 rounded border ${bgColor}">${tag}</span>`;
            }).join('');

            document.getElementById('modalTitle').textContent = data.title;
            document.getElementById('modalBudget').textContent = data.budget;
            document.getElementById('modalDate').textContent = data.date;
            document.getElementById('modalSource').textContent = data.source;
            document.getElementById('modalLocation').textContent = data.location;
            document.getElementById('modalUrl').href = data.url;
            
            document.getElementById('modalDescription').textContent = `
                ${data.title}。本项目位于${data.location}，预算${data.budget}，发布日期为${data.date}。
                数据来源：${data.source}。投标人需具备相应资质，并按要求提交投标文件。
                详情请查看招标公告原文。
            `;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event) {
            if (event && event.target !== modal) return;
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
        }

        // ESC key to close modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Hover effect enhancement
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.editorial-card').forEach(card => {
                card.addEventListener('mouseenter', () => {
                    card.style.transform = 'translateY(-4px)';
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'translateY(0)';
                });
            });
        });
    </script>
</body>
</html>
